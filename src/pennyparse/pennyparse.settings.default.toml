
[aigc.agent]
max_retry = 3
max_iter = 5

[aigc.api.chatcomp]
base = "http://localhost:8080/v1"
authkey = ""
model = ""
model_hasVision = true

[init.ignore]
ext = ["txt", "md", "html"]
folder = [".git", "__pycache__", "pennyparse_output", "pennyparse_results"]

[init.sampling]
by = "random"  # first, random, none
num = 3        # >=0
pdf_page = 3   # >=0
pdf_page_total_max = 20   # >=0

[orchestrator.decision.threshold]
by = "LLM"           # majority, LLM, LLM_proofread
majority_num = 2     # return last result when got $majority_num of same results
LLM_num = 1          # let LLM* decide/proofread when attempt > $LLM_num

[output]
dir = "output"
ext = "auto"  # auto, txt, md, html
pdf_perpage_threshold = 5  # if pdf_pages <= $pdf_perpage_threshold, put extracted text in a single output file

[cli]
timeout = 15

[web]
host = "0.0.0.0"
port = 52026
